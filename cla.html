<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>视频详情页</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Courier New", monospace;
        background: #0a0e27;
        color: #00ff9f;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: repeating-linear-gradient(
            0deg,
            rgba(0, 255, 159, 0.03) 0px,
            transparent 1px,
            transparent 2px,
            rgba(0, 255, 159, 0.03) 3px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(0, 255, 159, 0.03) 0px,
            transparent 1px,
            transparent 2px,
            rgba(0, 255, 159, 0.03) 3px
          );
        pointer-events: none;
        z-index: 1;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        z-index: 2;
      }
      .video-player {
        background: #000;
        border: 2px solid #00ff9f;
        border-radius: 0;
        overflow: hidden;
        margin-bottom: 20px;
        box-shadow: 0 0 20px rgba(0, 255, 159, 0.3),
          inset 0 0 20px rgba(0, 255, 159, 0.1);
        position: relative;
      }
      .video-player::before {
        content: "";
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, #00ff9f, #00d4ff, #ff00ff, #00ff9f);
        z-index: -1;
        filter: blur(10px);
        opacity: 0.5;
      }
      video {
        width: 100%;
        display: block;
      }
      .video-info {
        background: rgba(10, 14, 39, 0.8);
        padding: 20px;
        border: 1px solid #00ff9f;
        margin-bottom: 20px;
        box-shadow: 0 0 30px rgba(0, 255, 159, 0.2);
        backdrop-filter: blur(10px);
      }
      .video-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 15px;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-shadow: 0 0 10px #00ff9f, 0 0 20px #00ff9f;
        animation: glitch 3s infinite;
      }
      @keyframes glitch {
        0%,
        90%,
        100% {
          transform: translate(0);
        }
        92% {
          transform: translate(-2px, 2px);
        }
        94% {
          transform: translate(2px, -2px);
        }
      }
      .video-meta {
        display: flex;
        gap: 20px;
        color: #00d4ff;
        font-size: 14px;
        margin-bottom: 15px;
        font-family: "Courier New", monospace;
      }
      .video-meta span::before {
        content: "> ";
        color: #ff00ff;
      }
      .video-actions {
        display: flex;
        gap: 10px;
        padding: 15px 0;
        border-top: 1px solid #00ff9f;
      }
      .btn {
        padding: 10px 24px;
        border: 2px solid #00ff9f;
        background: transparent;
        color: #00ff9f;
        cursor: pointer;
        font-size: 14px;
        font-family: "Courier New", monospace;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s;
      }
      .btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(0, 255, 159, 0.3),
          transparent
        );
        transition: left 0.5s;
      }
      .btn:hover::before {
        left: 100%;
      }
      .btn:hover {
        background: rgba(0, 255, 159, 0.1);
        box-shadow: 0 0 20px rgba(0, 255, 159, 0.5);
        transform: translateY(-2px);
      }
      .video-description {
        background: rgba(10, 14, 39, 0.8);
        padding: 20px;
        border: 1px solid #00d4ff;
        line-height: 1.8;
        box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        backdrop-filter: blur(10px);
      }
      .description-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
        color: #ff00ff;
        text-transform: uppercase;
        letter-spacing: 2px;
        border-left: 4px solid #ff00ff;
        padding-left: 10px;
      }
      .video-description p {
        color: #00d4ff;
      }
      .scanline {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #00ff9f, transparent);
        animation: scan 4s linear infinite;
        pointer-events: none;
        z-index: 9999;
      }
      @keyframes scan {
        0% {
          top: 0;
        }
        100% {
          top: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="video-player">
        <video
          controls
          poster="https://via.placeholder.com/1200x675/000/fff?text=视频封面"
        >
          <source src="video.mp4" type="video/mp4" />
          您的浏览器不支持视频播放
        </video>
      </div>

      <div class="video-info">
        <h1 class="video-title">视频标题</h1>
        <div class="video-meta">
          <span>👁️ 10,234 次观看</span>
          <span>📅 2026-03-12</span>
          <span>⏱️ 15:30</span>
        </div>

        <div class="video-actions">
          <button class="btn">👍 点赞</button>
          <button class="btn">💬 评论</button>
          <button class="btn">🔗 分享</button>
          <button class="btn">⭐ 收藏</button>
        </div>
      </div>

      <div class="video-description">
        <div class="description-title">视频简介</div>
        <p>
          这里是视频的详细描述内容。可以包含视频的背景信息、主要内容介绍、相关链接等信息。
        </p>
      </div>
    </div>
  </body>
</html>
